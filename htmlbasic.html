<!DOCTYPE html>
<html>
<head>
  <title>Rock Paper Scissor</title>
</head>
<body>

<p>
  <button onclick="playermove('rock')">Rock</button>
  <button onclick="playermove('paper')">Paper</button>
  <button onclick="playermove('scissor')">Scissor</button>
  <button onclick="reset('reset')">reset score</button>
</p>

<script>
    let pscore=0;
    let cscore=0;

  function playermove(pmove) {
    const computer = computermove();
    let result = "";
    
    if (computer === pmove) {
      result = "Tie";
    } else if (
      (computer === "rock" && pmove === "scissor") ||
      (computer === "paper" && pmove === "rock") ||
      (computer === "scissor" && pmove === "paper")
    ) {
      result = "You Lose!";
      cscore+=1;
    } else {
      result = "You Win!";
      pscore+=1;
    }
    if(pmove==='reset'){
      pscore=0;
      cscore=0;
    }

    alert(`You: ${pmove}\nComputer: ${computer}\nResult: ${result}\nyour score ${pscore} computer score ${cscore}`);
  }

  function computermove() {
    const randomNum = Math.random();
    
    if (randomNum < 1/3) return "rock";
    else if (randomNum < 2/3) return "paper";
    else return "scissor";
  }
  function reset(){
    pscore=0;
    cscore=0;
  }
</script>

</body>
</html>
