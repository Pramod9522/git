<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <button onclick="
    pmove('rock');
    ">
    rock
  </button>
  <button  onclick="
    pmove('paper');
  "
  >
    paper
  </button>
  <button onclick="
    pmove('seasor');
    
  ">
    seasor
  </button>
  <button onclick="
  reset();
  ">
    reset
  </button>
  <script>
    let score=JSON.parse(localStorage.getItem('update'))||{
       pscore:0,
       cscore:0
    }
    

    function commove(){
      let value=Math.random();
      let cmove =
      value < 1 / 3? 'rock': value < 2 / 3? 'paper': 'scasor';
       return cmove;
    }
    
    
    function pmove(pmove)
    {
      let cmove=commove();
      let result='';
      
      if(pmove===cmove){
        result='tie';
      }
      else if(cmove==='rock' && pmove==='seasor'||
           cmove==='paper' && pmove==='rock'||
           cmove==='seasor' && pmove==='paper')
        {
          result='lose';
          score.cscore++;
        }
      else{
        result='win';
        score.pscore+=1;
      }
      localStorage.setItem('update',JSON.stringify(score));

      alert(`you picked ${pmove} and computer picked ${cmove} and result is ${result}\n your score ${score.pscore}\ncomputer score ${score.cscore}`);
    }
    function reset()
    {
      localStorage.removeItem('update');
      
      score.pscore=0;
      score.cscore=0;
      
    }
  </script>
</body>
</html>
